apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: wil-app
  namespace: argocd
spec:
  project: default

  source:
    repoURL: http://gitlab-webservice-default.gitlab.svc.cluster.local:8181/root/iot_deployment_hferraud.git
    targetRevision: main
    path: app

  destination:
    namespace: dev
    server: https://kubernetes.default.svc

  syncPolicy:
    automated:
      prune: true
      selfHeal: true